name: 🔄 Auto-Update Dashboard

on:
  schedule:
    - cron: '0 5 * * *'   # Runs every day at 5:00 AM UTC (8 AM EAT)
  workflow_dispatch:        # Also lets you click "Run" manually anytime

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔨 Run build script
        run: python build.py

      - name: 📤 Commit and push updated dashboard
        run: |
          git config user.name  "Dashboard Bot"
          git config user.email "bot@jumia-dashboard.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 Auto-update dashboard - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
